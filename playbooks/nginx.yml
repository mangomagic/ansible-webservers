---
- hosts: webservers
  become: yes

  tasks:
    - name: Install Nginx
      package:
        name:
          - nginx
          - ssl-cert
        state: present

    - name: Main Nginx configuration
      template:
        src: nginx/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
      notify:
        - reload nginx

    # - name: Delete all conf.d files
    #   file:
    #     path: "/etc/nginx/conf.d/*"
    #     state: absent

    - name: Nginx configurations (conf.d)
      template:
        src: "{{ item }}"
        dest: "/etc/nginx/conf.d/{{ item }}"
        mode: 644
      with_fileglob:
        - 'templates/nginx/conf.d/*'
      notify:
        - reload nginx

    - name: Install UFW
      apt:
        name: ufw
        state: present
        update_cache: yes

    - name: Allow SSH through UFW
      ufw:
        rule: allow
        name: OpenSSH

    - name: Allow Nginx through UFW
      ufw:
        rule: allow
        name: Nginx Full

    - name: Enable UFW
      ufw:
        state: enabled
      when: "'production' in group_names"

  handlers:
    - name: reload nginx
      command: nginx -s reload